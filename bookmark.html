<div class="syq-popup syq-bookmark-popup">
    <div class="syq-compose-header">
        <button id="syq-close-bookmark" class="syq-icon-button" type="button" aria-label="닫기">&times;</button>
    </div>

    <div class="syq-mobile-sheet">
        <div class="syq-section">
            <label class="syq-label" for="syq-bookmark-title">북마크 제목</label>
            <input id="syq-bookmark-title" class="syq-field" type="text" maxlength="80" placeholder="북마크 제목을 입력해주세요." />
        </div>
    </div>

    <div class="syq-footer">
        <button id="syq-cancel-bookmark" class="syq-cancel-button" type="button">닫기</button>
        <button id="syq-save-bookmark" class="syq-share-button" type="button">저장하기</button>
    </div>
</div>
