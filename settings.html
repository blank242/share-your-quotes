<div class="syq-settings inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
        <b>Share Your Quotes</b>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
        <p class="syq-settings-copy">
            Copy a sentence, turn it into a polished quote card, and save it as a PNG.
        </p>
        <div class="syq-settings-actions flex-container flexGap5 flexWrap">
            <button id="syq-open-from-clipboard" class="menu_button flexGap5">
                <i class="fa-solid fa-clipboard"></i>
                <span>Open from Clipboard</span>
            </button>
            <button id="syq-open-empty" class="menu_button flexGap5">
                <i class="fa-solid fa-image"></i>
                <span>Open Composer</span>
            </button>
            <button id="syq-open-library" class="menu_button flexGap5">
                <i class="fa-regular fa-bookmark"></i>
                <span>Saved Quotes</span>
            </button>
        </div>
        <label class="checkbox_label" for="syq-enable-selection-bubble">
            <input id="syq-enable-selection-bubble" type="checkbox" />
            <span>Show "이미지로 공유" bubble after selecting chat text</span>
        </label>
    </div>
</div>
