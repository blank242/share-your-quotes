<div class="syq-popup syq-editor-popup">
    <div class="syq-compose-header">
        <button id="syq-close-editor" class="syq-icon-button" type="button" aria-label="닫기">&times;</button>
    </div>

    <div class="syq-mobile-sheet">
        <div class="syq-section">
            <label class="syq-label" for="syq-edit-quote-text">문장</label>
            <textarea id="syq-edit-quote-text" class="syq-field syq-textarea" rows="5" placeholder="문장을 입력해주세요."></textarea>
            <label class="syq-label" for="syq-edit-quote-title">제목</label>
            <input id="syq-edit-quote-title" class="syq-field" type="text" maxlength="80" />
            <label class="syq-label" for="syq-edit-quote-author">작가</label>
            <input id="syq-edit-quote-author" class="syq-field" type="text" maxlength="80" />
        </div>
    </div>

    <div class="syq-footer">
        <button id="syq-cancel-edit" class="syq-cancel-button" type="button">닫기</button>
        <button id="syq-save-edit" class="syq-share-button" type="button">저장하기</button>
    </div>
</div>
